<section
  class="animated-section"
  [ngClass]="{
    'animated-section--reverse': reverse(),
    'animated-section--compact': compact(),
    'animated-section--two-cols': twoColumns()
  }"
  [appViewportAnimate]="enter()"
  [appViewportAnimateLeave]="leave()"
  [appViewportAnimateBidirectional]="true"
  [appViewportAnimateDuration]="900"
>
  <ng-content />
</section>
