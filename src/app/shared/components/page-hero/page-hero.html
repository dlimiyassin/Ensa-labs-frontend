<section class="page-hero" [style.backgroundImage]="'url(' + image() + ')'" [attr.aria-label]="title()">
  <div class="page-hero__overlay"></div>

  <div class="page-hero__inner" appAnimate="softSlideRight" [appAnimateDuration]="820" [appAnimateDelay]="360">
    <h1>{{ title() }}</h1>
    @if (subtitle()) {
      <p>{{ subtitle() }}</p>
    }
  </div>
</section>
