<section class="hero-carousel" aria-label="Présentation de la plateforme des laboratoires">
  <div class="hero-carousel__viewport">
    @if (previousSlide(); as prevSlide) {
      <div
        class="hero-carousel__slide hero-carousel__slide--previous"
        [class.is-exit-forward]="direction() === 'forward'"
        [class.is-exit-backward]="direction() === 'backward'"
        [style.backgroundImage]="'url(' + prevSlide.image + ')'"
        [attr.aria-hidden]="true"
      ></div>
    }

    <div
      class="hero-carousel__slide hero-carousel__slide--current"
      [class.is-enter-forward]="direction() === 'forward'"
      [class.is-enter-backward]="direction() === 'backward'"
      [style.backgroundImage]="'url(' + currentSlide().image + ')'"
      [attr.aria-label]="currentSlide().alt"
    >
      <div class="hero-carousel__overlay"></div>

      @for (slide of [currentSlide()]; track currentIndex()) {
        <div
          class="hero-carousel__content"
          appAnimate="softSlideRight"
          [appAnimateDuration]="1500"
          [appAnimateDelay]="500"
        >
          <!-- <p class="hero-carousel__eyebrow">Plateforme des laboratoires</p> -->
          <h1>{{ slide.title }}</h1>
          <p>{{ slide.subtitle }}</p>
          <a class="hero-carousel__cta" [routerLink]="slide.ctaRoute">{{ slide.ctaLabel }}</a>
        </div>
      }
    </div>
  </div>

  <button class="hero-carousel__control hero-carousel__control--prev" type="button" (click)="previous()" aria-label="Image précédente">
    <span aria-hidden="true">‹</span>
  </button>

  <button class="hero-carousel__control hero-carousel__control--next" type="button" (click)="next()" aria-label="Image suivante">
    <span aria-hidden="true">›</span>
  </button>

  <div class="hero-carousel__indicators" appAnimate="fadeIn" [appAnimateDuration]="1200" [appAnimateDelay]="220">
    @for (slide of slides; track trackByIndex($index)) {
      <button
        type="button"
        class="hero-carousel__dot"
        [class.is-active]="$index === currentIndex()"
        [attr.aria-label]="'Aller à la diapositive ' + ($index + 1)"
        [attr.aria-current]="$index === currentIndex() ? 'true' : null"
        (click)="goTo($index)"
      ></button>
    }
  </div>
</section>
