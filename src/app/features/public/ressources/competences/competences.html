<section class="internal-page">
  <app-page-hero
    title="Compétences scientifiques"
    subtitle="Panorama des expertises mobilisables dans les laboratoires."
    image="images/labs/lab2.jpg"
  />

  <div class="internal-page__content resources-page">
    <app-section-title label="Ressources" title="Compétences par domaine" />

    @if (loading()) {
      <app-spinner message="Chargement des compétences..." />
    } @else if (error()) {
      <p class="internal-page__lead">{{ error() }}</p>
    } @else if (!hasData()) {
      <app-empty-state message="Aucune compétence n'a été remontée par le backend." />
    } @else {
      <div class="resources-grid">
        @if (byType().SCIENTIFIC.length > 0) {
          <app-list-block title="compétences scientifiques et méthodologiques." [items]="byType().SCIENTIFIC" />
        }
        @if (byType().TECHNOLOGICAL.length > 0) {
          <app-list-block title="savoir-faire technologique-" [items]="byType().TECHNOLOGICAL" />
        }
        @if (byType().SECTORIAL.length > 0) {
          <app-list-block title="compétences sectorielles" [items]="byType().SECTORIAL" />
        }
        @if (byType().INNOVATION.length > 0) {
          <app-list-block title="Capacité d’innovation et de transfert" [items]="byType().INNOVATION" />
        }
      </div>
    }
  </div>
</section>
