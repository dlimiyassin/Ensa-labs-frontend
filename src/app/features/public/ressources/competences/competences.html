<section class="internal-page">
  <app-page-hero
    title="Compétences scientifiques"
    subtitle="Panorama des expertises mobilisables dans les laboratoires."
    image="images/labs/lab2.jpg"
  />

  <div class="internal-page__content resources-page">
    <app-section-title label="Ressources" title="Compétences par domaine" />

    @if (loading()) {
      <app-spinner message="Chargement des compétences..." />
    } @else if (error()) {
      <p class="internal-page__lead">{{ error() }}</p>
    } @else if (!hasData()) {
      <app-empty-state message="Aucune compétence n'a été remontée par le backend." />
    } @else {
      <div class="resources-grid">
        <app-list-block title="SCIENTIFIC" [items]="byType().SCIENTIFIC" />
        <app-list-block title="TECHNOLOGICAL" [items]="byType().TECHNOLOGICAL" />
        <app-list-block title="SECTORIAL" [items]="byType().SECTORIAL" />
        <app-list-block title="INNOVATION" [items]="byType().INNOVATION" />
      </div>
    }
  </div>
</section>
